<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen</title>

    <!-- this automatically sends the user to the home page after 4 seconds -->
    <meta http-equiv="refresh" content="4;url=home.html">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e2638;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        .splash-box {
            padding-top: 100px;
        }

        h1 {
            font-size: 45px;
            color: #FD6925;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 2px;
            color: #cccccc;
            text-transform: uppercase;
        }

        p.mission {
            max-width: 500px;
            margin: 20px auto;
            font-size: 16px;
            line-height: 1.5;
        }

        .members {
            margin-top: 30px;
            margin-bottom: 40px;
        }

        .members span {
            display: inline-block;
            background-color: #333c52;
            padding: 6px 14px;
            margin: 4px;
            border-radius: 10px;
            font-size: 14px;
        }

        /* simple css spinner loader */
        .loader {
            border: 6px solid #333c52;
            border-top: 6px solid #FD6925;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #countdown {
            font-size: 16px;
            margin-bottom: 25px;
        }

        #skipBtn {
            background-color: #FD6925;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        #skipBtn:hover {
            background-color: #e2591c;
        }
    </style>
</head>

<body>

    <div class="splash-box">
        <p class="subtitle">SDG 9 - Industry, Innovation and Infrastructure</p>
        <h1>Coder</h1>

        <p class="mission">
            Coder is a student project about building smarter, more resilient
            infrastructure. We want to show small actions that individuals can take
            to help SDG 9.
        </p>

        <div class="members">
            <!-- TODO: change these to your real team names -->
            <span>Student 1</span>
            <span>Student 2</span>
            <span>Student 3</span>
            <span>Student 4</span>
        </div>

        <div class="loader"></div>

        <p id="countdown">Entering site in 4...</p>

        <button id="skipBtn">Skip Intro</button>
    </div>

    <script src="splash_script.js"></script>
</body>

</html>
